name: ErhuApp
options:
  bundleIdPrefix: com.erhu
  xcodeVersion: "16.0"
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
  configs:
    debug:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
    release:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
targets:
  ErhuApp:
    type: application
    platform: iOS
    sources:
      - path: Sources/ErhuApp
    settings:
      base:
        PRODUCT_NAME: ErhuApp
        PRODUCT_BUNDLE_IDENTIFIER: com.erhu.app
        INFOPLIST_FILE: Sources/ErhuApp/Info.plist
        SWIFT_VERSION: "6.0"
    info:
      path: Sources/ErhuApp/Info.plist
      properties:
        CFBundleDisplayName: 二胡识谱
        CFBundleDevelopmentRegion: zh_CN
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: com.erhu.app
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: ErhuApp
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - armv7
          - microphone
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: 二胡识谱需要使用麦克风来检测您的演奏音高，以便判断音准是否正确。
